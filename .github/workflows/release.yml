name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Show Node.js and npm versions
        run: |
          node --version
          npm --version
      
      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: List dist directory contents
        if: always()
        shell: bash
        run: |
          echo "=== Dist directory contents ==="
          if [ "$RUNNER_OS" == "Windows" ]; then
            cmd //c dir dist
          else
            ls -lah dist/
          fi
      
      # Windows: Upload all artifacts
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/
          if-no-files-found: error
      
      # macOS: Upload all artifacts
      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/
          if-no-files-found: error
      
      # Linux: Upload all artifacts
      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/windows
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist/macos
      
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist/linux
      
      - name: List downloaded artifacts
        run: |
          echo "=== Windows ==="
          ls -lah dist/windows/ || echo "No Windows artifacts"
          echo "=== macOS ==="
          ls -lah dist/macos/ || echo "No macOS artifacts"
          echo "=== Linux ==="
          ls -lah dist/linux/ || echo "No Linux artifacts"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/windows/*.zip
            dist/windows/*.exe
            dist/windows/*.blockmap
            dist/windows/*.yml
            dist/macos/*.dmg
            dist/macos/*.zip
            dist/linux/*.AppImage
            dist/linux/*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
